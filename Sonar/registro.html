<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sonar - Registro</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/src/styles/style.css">
</head>
<body class="register-page">

    <nav class="navbar" id="navbar">
        <div class="nav-container">
            <a href="/index.html" class="nav-logo">
                <img src="/Sonar_1_-removebg-preview.png" alt="Sonar Logo">
            </a>
            <div class="nav-actions">
                <a href="/index.html" class="btn-nav">Volver al Inicio</a>
            </div>
            <button class="hamburger" id="hamburger" aria-label="Menú">
                <span></span><span></span><span></span>
            </button>
        </div>
    </nav>

    <section class="login-hero">
        <div class="hero-particles" id="particles"></div>
        <div class="login-hero-content">
            <img src="/SonarLogo_solodibujo.png" alt="Sonar" class="login-hero-logo">
            <h1 class="hero-title"><span class="hero-title-line">SONAR</span></h1>
            <div class="login-container">
                <h2>Crear Cuenta</h2>
                <form id="registroForm" class="login-form">
                    <div class="form-group">
                        <label for="alias">Alias</label>
                        <input type="text" id="alias" placeholder="tu_alias" required>
                    </div>
                    <div class="form-group">
                        <label for="nombre">Nombre</label>
                        <input type="text" id="nombre" placeholder="Tu nombre" required>
                    </div>
                    <div class="form-row">
                        <div class="form-group">
                            <label for="apellido1">Primer Apellido</label>
                            <input type="text" id="apellido1" placeholder="Primer apellido" required>
                        </div>
                        <div class="form-group">
                            <label for="apellido2">Segundo Apellido</label>
                            <input type="text" id="apellido2" placeholder="Segundo apellido">
                        </div>
                    </div>
                    <div class="form-group">
                        <label for="email">Correo Electrónico</label>
                        <input type="email" id="email" placeholder="tu@email.com" required>
                    </div>
                    <div class="form-group">
                        <label for="password">Contraseña</label>
                        <input type="password" id="password" placeholder="••••••••" required>
                    </div>
                    <button type="submit" class="btn-primary login-submit-btn">Crear Cuenta</button>
                </form>
                <p class="register-link">¿Ya tienes cuenta? <a href="/login.html">Inicia sesión</a></p>
            </div>
        </div>
    </section>

    <script type="module" src="/src/main.js"></script>
    
</body>
</html>
