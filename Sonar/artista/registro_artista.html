<!DOCTYPE html>
<html lang="es">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Sonar - Registro Artista</title>
	<link rel="preconnect" href="https://fonts.googleapis.com">
	<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
	<link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700;900&display=swap" rel="stylesheet">
	<link rel="stylesheet" href="../src/styles/style.css">
</head>
<body class="register-page register-artist-page">

	<nav class="navbar" id="navbar">
		<div class="nav-container">
			<a href="/index.html" class="nav-logo">
				<img src="../src/assets/Sonar_1_-removebg-preview.png" alt="Sonar Logo">
			</a>
			<div class="nav-actions">
				<a href="../registro.html" class="btn-nav">Volver</a>
			</div>
			<button class="hamburger" id="hamburger" aria-label="Menú">
				<span></span><span></span><span></span>
			</button>
		</div>
	</nav>

	<section class="login-hero">
		<div class="hero-particles" id="particles"></div>
		<div class="login-hero-content">
			<img src="../src/assets/SonarLogo_solodibujo.png" alt="Sonar" class="login-hero-logo">
			<h1 class="hero-title"><span class="hero-title-line">SONAR</span></h1>
			<div class="login-container">
				<h2>Registro de Artista</h2>
				<form id="registroArtistaForm" class="login-form">
					<div class="form-group">
						<label for="artistaNombre">Nombre artístico</label>
						<input type="text" id="artistaNombre" placeholder="Tu nombre artístico" required>
					</div>
					<div class="form-group">
						<label for="artistaEmail">Correo Electrónico</label>
						<input type="email" id="artistaEmail" placeholder="tu@email.com" required>
					</div>
					<div class="form-group">
						<label for="artistaPassword">Contraseña</label>
						<input type="password" id="artistaPassword" placeholder="••••••••" required>
					</div>
					<div class="form-group">
						<label for="artistaImagen">Imagen de perfil (URL, opcional)</label>
						<input type="url" id="artistaImagen" placeholder="https://...">
					</div>
					<button type="submit" class="btn-primary login-submit-btn">Crear Cuenta de Artista</button>
				</form>
				<p class="register-link">¿Ya tienes cuenta? <a href="../login.html">Inicia sesión</a></p>
			</div>
		</div>
	</section>

	<script type="module" src="../src/main.js"></script>

</body>
</html>
