<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sonar - Iniciar Sesión</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/src/styles/style.css">
</head>
<body>

    <!-- NAVBAR -->
    <nav class="navbar" id="navbar">
        <div class="nav-container">
            <a href="/index.html" class="nav-logo">
                <img src="/Sonar_1_-removebg-preview.png" alt="Sonar Logo">
            </a>
            <div class="nav-actions">
                <a href="/index.html" class="btn-nav">Volver al Inicio</a>
            </div>
            <button class="hamburger" id="hamburger" aria-label="Menú">
                <span></span><span></span><span></span>
            </button>
        </div>
    </nav>

    <!-- LOGIN SECTION -->
    <section class="login-hero">
        <div class="hero-particles" id="particles"></div>
        <div class="login-hero-content">
            <img src="/SonarLogo_solodibujo.png" alt="Sonar" class="login-hero-logo">
            <h1 class="hero-title"><span class="hero-title-line">SONAR</span></h1>
            <div class="login-container">
                <h2>Iniciar Sesión</h2>
                <form id="loginForm" class="login-form">
                    <div class="form-group">
                        <label for="email">Correo Electrónico</label>
                        <input type="email" id="email" name="email" placeholder="tu@email.com" required>
                    </div>
                    <div class="form-group">
                        <label for="password">Contraseña</label>
                        <input type="password" id="password" name="password" placeholder="••••••••" required>
                    </div>
                    <button type="submit" class="btn-primary login-submit-btn">Iniciar Sesión</button>
                </form>
                <p class="register-link">¿No tienes cuenta? <a href="/registro.html">Regístrate</a></p>
            </div>
        </div>
    </section>

    <script type="module" src="/src/animaciones.js"></script>

</body>
</html>
